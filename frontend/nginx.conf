server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Proxy API to backend
    location ~ ^/(admin|v1)/ {
        proxy_pass http://backend:8080;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        # Required for SSE streaming
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 300s;
    }

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }
}
