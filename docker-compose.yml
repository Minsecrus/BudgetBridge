services:
  backend:
    build: ./backend
    volumes:
      - ./backend/config.yaml:/app/config.yaml:ro
    ports:
      - "__BACKEND_PORT__:__BACKEND_PORT__"
    restart: unless-stopped

  frontend:
    build: ./frontend
    ports:
      - "__FRONTEND_PORT__:80"
    depends_on:
      - backend
    restart: unless-stopped
